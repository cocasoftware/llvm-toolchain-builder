name: Install Visual Studio 2022 Build Tools (Windows ARM64)
description: |
  Bootstrap MSVC + Windows SDK on Windows ARM64 hosted runners that ship a
  minimal partner-managed image without Visual Studio.

  Installs VS 2022 Build Tools with the VCTools workload + the recommended
  components, which on an ARM64 host pulls in:

    - cl.exe, armasm64.exe, lib.exe, link.exe (native ARM64 toolchain)
    - rc.exe + the latest Windows SDK (headers, import libs)

  After installation `vswhere.exe` is present at its canonical global path
  (`C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe`),
  so the existing `Invoke-VsDevShell` helper in the build scripts works
  without modification.

  Idempotent: if `vswhere -latest -requires VC.Tools.ARM64` already reports
  an installation, the download/install is skipped.

  We deliberately do NOT pass extra component IDs (e.g. a specific
  Windows11SDK.<build> id) — those vary across VS releases and an unknown
  id makes the bootstrapper exit 87 (ERROR_INVALID_PARAMETER) before any
  install happens. Letting `--includeRecommended` pick the SDK is both
  more robust and forward-compatible.

runs:
  using: composite
  steps:
    - name: Install VS 2022 Build Tools (ARM64)
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'

        $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
        if (Test-Path -LiteralPath $vswhere) {
            $existing = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.ARM64 -property installationPath
            if ($existing) {
                Write-Host "VS Build Tools (VC ARM64) already installed at: $existing"
                exit 0
            }
        }

        $url       = 'https://aka.ms/vs/17/release/vs_buildtools.exe'
        $installer = Join-Path $env:RUNNER_TEMP 'vs_buildtools.exe'

        Write-Host "Downloading VS 2022 Build Tools installer ..."
        Write-Host "  URL: $url"
        & curl.exe --fail --location --retry 5 --retry-delay 2 --retry-all-errors --silent --show-error --output $installer $url
        if ($LASTEXITCODE -ne 0) { throw "curl failed (exit $LASTEXITCODE) downloading $url" }

        # Workload.VCTools alone installs only the x64/x86 toolset — the
        # ARM64/ARM64EC compiler (Component.VC.Tools.ARM64) is NOT bundled
        # by --includeRecommended on any host and must be requested explicitly.
        # That component ID is stable across VS 2022 releases; the exit-87
        # problem in the previous attempt came from a Windows-SDK component id
        # (Windows11SDK.22621), which we now let --includeRecommended pick.
        $iargs = @(
            '--quiet', '--wait', '--norestart', '--nocache',
            '--add', 'Microsoft.VisualStudio.Workload.VCTools',
            '--add', 'Microsoft.VisualStudio.Component.VC.Tools.ARM64',
            '--includeRecommended'
        )

        Write-Host "Installing VS 2022 Build Tools (~5-10 min)"
        Write-Host ("  args: " + ($iargs -join ' '))
        $start = Get-Date
        $proc  = Start-Process -FilePath $installer -ArgumentList $iargs -Wait -PassThru -NoNewWindow
        $mins  = ((Get-Date) - $start).TotalMinutes
        Write-Host ("Installer finished in {0:N1} min, exit code: {1}" -f $mins, $proc.ExitCode)

        # 0 = success; 3010 = success but reboot pending (we don't reboot CI runners)
        if ($proc.ExitCode -ne 0 -and $proc.ExitCode -ne 3010) {
            # Bootstrapper writes its own diagnostic logs to %TEMP%\dd_*.log
            # (named after the dynamic guid Setup creates). We dump every
            # such file we can find — the actual install logs are inside
            # %ProgramData%\Microsoft\VisualStudio\Packages\_Instances\* and
            # %TEMP%\dd_setup_*_errors.log when bootstrap-stage failures occur.
            Write-Host "::group::vs_buildtools.exe diagnostic logs"
            $candidates = @()
            $candidates += Get-ChildItem -Path $env:TEMP -Filter 'dd_*.log' -ErrorAction SilentlyContinue
            $candidates += Get-ChildItem -Path $env:RUNNER_TEMP -Filter 'dd_*.log' -ErrorAction SilentlyContinue -Recurse
            $candidates += Get-ChildItem -Path "$env:ProgramData\Microsoft\VisualStudio\Packages\_Instances" -Recurse -Filter '*.log' -ErrorAction SilentlyContinue
            foreach ($f in $candidates) {
                Write-Host "----- $($f.FullName) -----"
                Get-Content -LiteralPath $f.FullName -Tail 100 -ErrorAction SilentlyContinue
            }
            Write-Host "::endgroup::"
            throw "vs_buildtools.exe failed with exit code $($proc.ExitCode)"
        }

        if (-not (Test-Path -LiteralPath $vswhere)) {
            throw "vswhere.exe missing after install (expected at $vswhere)"
        }
        $installed = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.ARM64 -property installationPath
        if (-not $installed) {
            throw "Install completed but VC ARM64 tools not detected by vswhere"
        }
        Write-Host "VS Build Tools verified at: $installed"
        Remove-Item -LiteralPath $installer -Force -ErrorAction SilentlyContinue
