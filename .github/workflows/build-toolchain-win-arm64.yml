name: Build LLVM Toolchain (Windows ARM64)
# Two-stage build of a portable LLVM toolchain on Windows ARM64 (aarch64):
#   Stage 1: MSVC cl.exe (arm64 native) builds a minimal LLVM (cached, artifact: *-msvc)
#   Stage 2: Stage 1 clang-cl rebuilds LLVM with libc++ (artifact: final)
#
# Runs on a native ARM64 runner (`windows-2022-arm-64core`) — there is no
# cross-build from x64; every binary is produced with arm64 instructions.
#
# Both main and p2996 variants go through Stage 1 → Stage 2 → Verify.
# Stage 1 is cached based on build-llvm.ps1 hash to avoid rebuilds.

on:
  workflow_dispatch:
    inputs:
      llvm_version:
        description: 'LLVM version to build'
        required: true
        default: '21.1.1'
      build_p2996:
        description: 'Also build p2996 variant'
        type: boolean
        default: true
  push:
    branches: [main]
    paths:
      - 'scripts/common/**'
      - 'scripts/windows-arm64/**'
      - '.github/workflows/build-toolchain-win-arm64.yml'
      - '.github/actions/install-pwsh-arm64/**'
      - '.github/actions/install-vs-buildtools-arm64/**'
      - '.github/actions/install-git-arm64/**'

env:
  LLVM_VERSION: ${{ github.event.inputs.llvm_version || '21.1.1' }}
  # Short build dir to avoid MAX_PATH issues with LLDB
  BUILD_DIR: 'C:\b'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Job 1: Stage 1 — MSVC-built LLVM (cached, used as compiler for Stage 2)
  # ===========================================================================
  stage1-main:
    name: Stage 1 (main, MSVC arm64)
    runs-on: windows-2022-arm-64core
    timeout-minutes: 720
    env:
      VARIANT: main
      INSTALL_PREFIX: 'C:\stage1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Stage 1
        id: cache-stage1
        uses: actions/cache@v4
        with:
          path: C:\stage1-archive
          key: win-arm64-stage1-v1-llvm${{ env.LLVM_VERSION }}-${{ hashFiles('scripts/windows-arm64/build-llvm.ps1') }}

      - name: Install PowerShell 7 (arm64)
        if: steps.cache-stage1.outputs.cache-hit != 'true'
        uses: ./.github/actions/install-pwsh-arm64

      - name: Setup Python 3.14
        if: steps.cache-stage1.outputs.cache-hit != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Python deps
        if: steps.cache-stage1.outputs.cache-hit != 'true'
        shell: pwsh
        run: python -m pip install pybind11 nanobind

      - name: Free disk space
        if: steps.cache-stage1.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $dirs = @(
            'C:\Android', 'C:\SeleniumWebDrivers',
            "${env:JAVA_HOME_8_X64}", "${env:JAVA_HOME_11_X64}",
            "${env:JAVA_HOME_17_X64}", "${env:JAVA_HOME_25_X64}",
            'C:\Program Files\dotnet\sdk',
            'C:\Program Files (x86)\Microsoft SDKs\Azure',
            'C:\hostedtoolcache\Ruby', 'C:\hostedtoolcache\go',
            'C:\hostedtoolcache\CodeQL', 'C:\Miniconda'
          )
          foreach ($d in $dirs) {
            if (Test-Path $d) {
              Write-Host "Removing $d ..."
              Remove-Item $d -Recurse -Force -ErrorAction SilentlyContinue
            }
          }

      - name: Install VS 2022 Build Tools (ARM64)
        if: steps.cache-stage1.outputs.cache-hit != 'true'
        uses: ./.github/actions/install-vs-buildtools-arm64

      - name: Install Git (ARM64)
        if: steps.cache-stage1.outputs.cache-hit != 'true'
        uses: ./.github/actions/install-git-arm64

      - name: Build Stage 1
        if: steps.cache-stage1.outputs.cache-hit != 'true'
        shell: pwsh
        env:
          NPROC: '4'
          PYTHON_DIR: ${{ env.pythonLocation }}
          SKIP_ARCHIVE: 'true'
        run: |
          & "${{ github.workspace }}\scripts\windows-arm64\build-llvm.ps1"

      - name: Archive Stage 1 for cache
        if: steps.cache-stage1.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path C:\stage1-archive -Force | Out-Null
          & 7z a -tzip -mx=3 -mmt=on C:\stage1-archive\stage1.zip C:\stage1 | Select-Object -Last 3

      - name: Upload Stage 1 artifact (MSVC build)
        uses: actions/upload-artifact@v4
        with:
          name: coca-toolchain-win-arm64-msvc
          path: C:\stage1-archive\stage1.zip
          retention-days: 14
          if-no-files-found: error

  # ===========================================================================
  # Job 2: Stage 2 — clang-cl + libc++ full-featured toolchain
  # ===========================================================================
  stage2-main:
    name: Stage 2 (main, libc++ arm64)
    needs: stage1-main
    runs-on: windows-2022-arm-64core
    timeout-minutes: 720
    env:
      VARIANT: main
      INSTALL_PREFIX: 'C:\coca-toolchain'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PowerShell 7 (arm64)
        uses: ./.github/actions/install-pwsh-arm64

      - name: Setup Python 3.14 (for LLDB + MLIR bindings)
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Python deps (MLIR Python bindings)
        shell: pwsh
        run: python -m pip install pybind11 nanobind

      - name: Free disk space
        shell: pwsh
        run: |
          $dirs = @(
            'C:\Android', 'C:\SeleniumWebDrivers',
            "${env:JAVA_HOME_8_X64}", "${env:JAVA_HOME_11_X64}",
            "${env:JAVA_HOME_17_X64}", "${env:JAVA_HOME_25_X64}",
            'C:\Program Files\dotnet\sdk',
            'C:\Program Files (x86)\Microsoft SDKs\Azure',
            'C:\hostedtoolcache\Ruby', 'C:\hostedtoolcache\go',
            'C:\hostedtoolcache\CodeQL', 'C:\Miniconda'
          )
          foreach ($d in $dirs) {
            if (Test-Path $d) {
              Write-Host "Removing $d ..."
              Remove-Item $d -Recurse -Force -ErrorAction SilentlyContinue
            }
          }

      - name: Install VS 2022 Build Tools (ARM64)
        uses: ./.github/actions/install-vs-buildtools-arm64

      - name: Install Git (ARM64)
        uses: ./.github/actions/install-git-arm64

      - name: Download Stage 1
        uses: actions/download-artifact@v4
        with:
          name: coca-toolchain-win-arm64-msvc
          path: C:\stage1-dl

      - name: Extract Stage 1
        shell: pwsh
        run: |
          & 7z x C:\stage1-dl\stage1.zip -oC:\ -y
          Write-Host "Stage 1 clang-cl version:"
          & C:\stage1\bin\clang-cl.exe --version

      - name: Build Stage 2
        shell: pwsh
        env:
          STAGE1_DIR: 'C:\stage1'
          BUILD_DIR: 'C:\b2'
          NPROC: '4'
          PYTHON_DIR: ${{ env.pythonLocation }}
        run: |
          & "${{ github.workspace }}\scripts\windows-arm64\build-llvm-stage2.ps1"

      - name: Disk space report (post-build)
        shell: pwsh
        if: always()
        run: Get-PSDrive -PSProvider FileSystem | Format-Table Name, @{N='Free(GB)';E={[math]::Round($_.Free/1GB,1)}}, @{N='Used(GB)';E={[math]::Round($_.Used/1GB,1)}}

      - name: Upload artifact (main, libc++)
        uses: actions/upload-artifact@v4
        with:
          name: coca-toolchain-win-arm64
          path: 'C:\coca-toolchain-win-arm64.zip'
          retention-days: 14
          if-no-files-found: error
          compression-level: 0

  # ===========================================================================
  # Job 3: Stage 1 p2996 — MSVC-built (cached)
  # ===========================================================================
  stage1-p2996:
    name: Stage 1 (p2996, MSVC arm64)
    runs-on: windows-2022-arm-64core
    if: ${{ github.event.inputs.build_p2996 != 'false' }}
    timeout-minutes: 720
    env:
      VARIANT: p2996
      INSTALL_PREFIX: 'C:\stage1-p2996'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Stage 1 (p2996)
        id: cache-stage1-p2996
        uses: actions/cache@v4
        with:
          path: C:\stage1-p2996-archive
          key: win-arm64-stage1-p2996-v1-${{ hashFiles('scripts/windows-arm64/build-llvm.ps1') }}

      - name: Install PowerShell 7 (arm64)
        if: steps.cache-stage1-p2996.outputs.cache-hit != 'true'
        uses: ./.github/actions/install-pwsh-arm64

      - name: Setup Python 3.14
        if: steps.cache-stage1-p2996.outputs.cache-hit != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Python deps
        if: steps.cache-stage1-p2996.outputs.cache-hit != 'true'
        shell: pwsh
        run: python -m pip install pybind11 nanobind

      - name: Free disk space
        if: steps.cache-stage1-p2996.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $dirs = @(
            'C:\Android', 'C:\SeleniumWebDrivers',
            "${env:JAVA_HOME_8_X64}", "${env:JAVA_HOME_11_X64}",
            "${env:JAVA_HOME_17_X64}", "${env:JAVA_HOME_25_X64}",
            'C:\Program Files\dotnet\sdk',
            'C:\Program Files (x86)\Microsoft SDKs\Azure',
            'C:\hostedtoolcache\Ruby', 'C:\hostedtoolcache\go',
            'C:\hostedtoolcache\CodeQL', 'C:\Miniconda'
          )
          foreach ($d in $dirs) {
            if (Test-Path $d) {
              Write-Host "Removing $d ..."
              Remove-Item $d -Recurse -Force -ErrorAction SilentlyContinue
            }
          }

      - name: Install VS 2022 Build Tools (ARM64)
        if: steps.cache-stage1-p2996.outputs.cache-hit != 'true'
        uses: ./.github/actions/install-vs-buildtools-arm64

      - name: Install Git (ARM64)
        if: steps.cache-stage1-p2996.outputs.cache-hit != 'true'
        uses: ./.github/actions/install-git-arm64

      - name: Build Stage 1 (p2996)
        if: steps.cache-stage1-p2996.outputs.cache-hit != 'true'
        shell: pwsh
        env:
          NPROC: '4'
          PYTHON_DIR: ${{ env.pythonLocation }}
          SKIP_ARCHIVE: 'true'
        run: |
          & "${{ github.workspace }}\scripts\windows-arm64\build-llvm.ps1"

      - name: Archive Stage 1 (p2996) for cache
        if: steps.cache-stage1-p2996.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path C:\stage1-p2996-archive -Force | Out-Null
          & 7z a -tzip -mx=3 -mmt=on C:\stage1-p2996-archive\stage1.zip C:\stage1-p2996 | Select-Object -Last 3

      - name: Upload Stage 1 artifact (p2996 MSVC)
        uses: actions/upload-artifact@v4
        with:
          name: coca-toolchain-p2996-win-arm64-msvc
          path: C:\stage1-p2996-archive\stage1.zip
          retention-days: 14
          if-no-files-found: error

  # ===========================================================================
  # Job 4: Stage 2 p2996 — clang-cl + libc++
  # ===========================================================================
  stage2-p2996:
    name: Stage 2 (p2996, libc++ arm64)
    needs: stage1-p2996
    if: ${{ github.event.inputs.build_p2996 != 'false' }}
    runs-on: windows-2022-arm-64core
    timeout-minutes: 720
    env:
      VARIANT: p2996
      INSTALL_PREFIX: 'C:\coca-toolchain-p2996'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PowerShell 7 (arm64)
        uses: ./.github/actions/install-pwsh-arm64

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Python deps
        shell: pwsh
        run: python -m pip install pybind11 nanobind

      - name: Free disk space
        shell: pwsh
        run: |
          $dirs = @(
            'C:\Android', 'C:\SeleniumWebDrivers',
            "${env:JAVA_HOME_8_X64}", "${env:JAVA_HOME_11_X64}",
            "${env:JAVA_HOME_17_X64}", "${env:JAVA_HOME_25_X64}",
            'C:\Program Files\dotnet\sdk',
            'C:\Program Files (x86)\Microsoft SDKs\Azure',
            'C:\hostedtoolcache\Ruby', 'C:\hostedtoolcache\go',
            'C:\hostedtoolcache\CodeQL', 'C:\Miniconda'
          )
          foreach ($d in $dirs) {
            if (Test-Path $d) {
              Write-Host "Removing $d ..."
              Remove-Item $d -Recurse -Force -ErrorAction SilentlyContinue
            }
          }

      - name: Install VS 2022 Build Tools (ARM64)
        uses: ./.github/actions/install-vs-buildtools-arm64

      - name: Install Git (ARM64)
        uses: ./.github/actions/install-git-arm64

      - name: Download Stage 1 (p2996)
        uses: actions/download-artifact@v4
        with:
          name: coca-toolchain-p2996-win-arm64-msvc
          path: C:\stage1-dl

      - name: Extract Stage 1
        shell: pwsh
        run: |
          & 7z x C:\stage1-dl\stage1.zip -oC:\ -y
          Rename-Item C:\stage1-p2996 C:\stage1
          & C:\stage1\bin\clang-cl.exe --version

      - name: Build Stage 2 (p2996)
        shell: pwsh
        env:
          STAGE1_DIR: 'C:\stage1'
          BUILD_DIR: 'C:\b2'
          NPROC: '4'
          PYTHON_DIR: ${{ env.pythonLocation }}
        run: |
          & "${{ github.workspace }}\scripts\windows-arm64\build-llvm-stage2.ps1"

      - name: Upload artifact (p2996, libc++)
        uses: actions/upload-artifact@v4
        with:
          name: coca-toolchain-p2996-win-arm64
          path: 'C:\coca-toolchain-p2996-win-arm64.zip'
          retention-days: 14
          if-no-files-found: error
          compression-level: 0

  # ===========================================================================
  # Job 5: Verify portability (main Stage 2)
  # ===========================================================================
  verify-main:
    name: Verify (main arm64)
    needs: stage2-main
    runs-on: windows-2022-arm-64core
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PowerShell 7 (arm64)
        uses: ./.github/actions/install-pwsh-arm64

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: coca-toolchain-win-arm64
          path: 'C:\'

      - name: Unpack toolchain
        shell: pwsh
        run: |
          & 7z x 'C:\coca-toolchain-win-arm64.zip' -oC:\ -y

      - name: Run portability verification
        shell: pwsh
        env:
          TOOLCHAIN_DIR: 'C:\coca-toolchain-win-arm64'
        run: |
          & "${{ github.workspace }}\scripts\windows-arm64\verify-portability.ps1"

  # ===========================================================================
  # Job 6: Verify portability (p2996 Stage 2)
  # ===========================================================================
  verify-p2996:
    name: Verify (p2996 arm64)
    needs: stage2-p2996
    if: ${{ github.event.inputs.build_p2996 != 'false' }}
    runs-on: windows-2022-arm-64core
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PowerShell 7 (arm64)
        uses: ./.github/actions/install-pwsh-arm64

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: coca-toolchain-p2996-win-arm64
          path: 'C:\'

      - name: Unpack toolchain
        shell: pwsh
        run: |
          & 7z x 'C:\coca-toolchain-p2996-win-arm64.zip' -oC:\ -y

      - name: Run portability verification
        shell: pwsh
        env:
          TOOLCHAIN_DIR: 'C:\coca-toolchain-p2996-win-arm64'
        run: |
          & "${{ github.workspace }}\scripts\windows-arm64\verify-portability.ps1"
